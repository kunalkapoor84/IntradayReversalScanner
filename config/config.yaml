# =============================================================================
# Intraday Reversal Scanner - Configuration
# =============================================================================

dhan:
  client_id: "${DHAN_CLIENT_ID}"
  access_token: "${DHAN_ACCESS_TOKEN}"
  api_base_url: "https://api.dhan.co/v2"
  ws_url: "wss://api.dhan.co/v2/ws"
  timeout_seconds: 5
  max_retries: 1

market:
  segments:
    - EQ   # NSE Cash
    - FO   # F&O
  top_n_stocks: 250
  min_avg_volume: 200000
  min_price: 100
  min_market_cap_crore: 5000
  exclude_circuit: true
  exclude_operator_stocks: true
  exchange: "NSE"

timeframes:
  - interval: "1m"
    label: "1min"
    bars: 200
  - interval: "5m"
    label: "5min"
    bars: 200
  - interval: "15m"
    label: "15min"
    bars: 200

scanners:
  bullish_pullback:
    enabled: true
    min_confidence: 75
  bearish_pullback:
    enabled: true
    min_confidence: 75
  exhaustion_reversal:
    enabled: true
    min_confidence: 80
  trend_reversal:
    enabled: true
    min_confidence: 75
  vwap_reversal:
    enabled: true
    min_confidence: 80
  failed_breakdown:
    enabled: true
    min_confidence: 78
  failed_breakout:
    enabled: true
    min_confidence: 78

indicators:
  ema_periods: [9, 20, 50, 200]
  vwap_period: 20
  atr_period: 14
  atr_multiplier: 2.0
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_period: 14
  adx_threshold: 20
  supertrend_period: 10
  supertrend_multiplier: 3.0
  stochastic_k: 14
  stochastic_d: 3
  cci_period: 20
  cmf_period: 20

trend_filter:
  higher_tf: "15min"
  mid_tf: "5min"
  entry_tf: "1min"
  min_adx: 20
  ema_alignment_required: true

volume:
  avg_period: 20
  volume_spike_multiplier: 2.0
  climax_ratio: 3.0
  dry_up_ratio: 0.3

risk:
  max_risk_per_trade_pct: 1.0
  max_daily_risk_pct: 3.0
  min_risk_reward: 2.0
  preferred_risk_reward: 3.0
  atr_stop_multiplier: 1.5
  trailing_stop_activation_pct: 1.0
  trailing_stop_distance_atr: 1.0
  max_position_size_crore: 5
  partial_exit_1_pct: 33
  partial_exit_2_pct: 33
  partial_exit_3_pct: 34

confidence:
  trend_quality_weight: 20
  volume_weight: 20
  structure_weight: 20
  momentum_weight: 15
  institutional_weight: 15
  relative_strength_weight: 10
  min_display_score: 75
  alert_threshold: 80

alerts:
  desktop_notification: true
  sound: true
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_user: ""
    smtp_password: "${SMTP_PASSWORD}"
    from_addr: ""
    to_addr: ""

dashboard:
  refresh_seconds: 30
  max_signals_display: 10
  color_buy: "green"
  color_sell: "red"
  color_neutral: "yellow"
  color_high_conviction: "cyan"

backtest:
  years: 5
  initial_capital: 10000000
  commission_pct: 0.01
  slippage_pct: 0.01
  output_dir: "backtest_results"

filters:
  opening_drive_minutes: 15
  atr_compression_threshold: 0.7
  high_probability_windows:
    morning_start: "09:45"
    morning_end: "11:30"
    afternoon_start: "13:30"
    afternoon_end: "15:00"
  max_intraday_move_pct: 5.0
  max_intraday_move_exceptional_pct: 7.0
  min_risk_reward: 2.0
  quality_labels:
    - A+
    - A
  target_vs_risk_ratio: 3.0

logging:
  level: "INFO"
  file: "logs/scanner.log"
  max_bytes: 10485760
  backup_count: 5
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {name}:{function}:{line} | {message}"